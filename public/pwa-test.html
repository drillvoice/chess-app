<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Training Logger</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        body { font-family: system-ui; padding: 20px; max-width: 600px; margin: 0 auto; }
        .status { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <h1>Chess Training Logger - PWA Test</h1>
    <div id="status"></div>
    <div id="manifest-test"></div>
    <div id="sw-test"></div>
    <script>
        const status = document.getElementById("status");
        const manifestTest = document.getElementById("manifest-test");
        const swTest = document.getElementById("sw-test");
        
        // Test manifest
        fetch("/manifest.json")
            .then(response => response.json())
            .then(manifest => {
                manifestTest.innerHTML = `<div class="status success">✓ Manifest loaded: ${manifest.name}</div>`;
                
                // Check required fields
                const required = ["name", "short_name", "start_url", "display", "icons"];
                const missing = required.filter(field => !manifest[field]);
                
                if (missing.length > 0) {
                    manifestTest.innerHTML += `<div class="status error">✗ Missing required fields: ${missing.join(", ")}</div>`;
                } else {
                    manifestTest.innerHTML += `<div class="status success">✓ All required manifest fields present</div>`;
                }
                
                // Check icons
                if (manifest.icons && manifest.icons.length > 0) {
                    manifestTest.innerHTML += `<div class="status success">✓ Icons array present (${manifest.icons.length} icons)</div>`;
                } else {
                    manifestTest.innerHTML += `<div class="status error">✗ Icons array missing or empty</div>`;
                }
            })
            .catch(err => {
                manifestTest.innerHTML = `<div class="status error">✗ Manifest error: ${err.message}</div>`;
            });
        
        // Test service worker
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/sw.js")
                .then(registration => {
                    swTest.innerHTML = `<div class="status success">✓ Service Worker registered</div>`;
                })
                .catch(err => {
                    swTest.innerHTML = `<div class="status error">✗ Service Worker error: ${err.message}</div>`;
                });
        } else {
            swTest.innerHTML = `<div class="status error">✗ Service Worker not supported</div>`;
        }
        
        // Overall status
        status.innerHTML = `<div class="status warning">Testing PWA compliance...</div>`;
    </script>
</body>
</html>
