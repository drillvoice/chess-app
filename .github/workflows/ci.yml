name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx playwright install --with-deps
      - name: Type check
        run: npm run type-check
      - name: Lint
        run: npm run lint
      - name: Check formatting
        run: npm run format:check
      - run: npm test
      - run: npm run test:e2e
