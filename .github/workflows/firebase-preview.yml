name: Deploy Firebase Preview

on:
  pull_request:
    branches: [ main ]

# Needed to post PR comments
permissions:
  contents: read
  pull-requests: write
  issues: write

# Kill older runs for the same PR to save time
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build the project
        run: npm run build

      # Use cached local firebase-tools via npx (no global install)
      - name: Deploy to Firebase preview channel
        id: firebase-deploy
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          CHANNEL_ID=pr-${{ github.event.pull_request.number }}
          npx firebase-tools hosting:channel:deploy "$CHANNEL_ID" --json > firebase_output.json
          node -e "const o=require('./firebase_output.json'); const urls=(o.result||[]).map(r=>r.url).filter(Boolean); if(!urls.length){console.error('No preview URL found'); process.exit(1)}; console.log('PREVIEW_URL='+urls[0]);" >> $GITHUB_ENV

      - name: Comment on PR with Preview URL
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `🚀 Firebase preview deployed: [View Preview](${process.env.PREVIEW_URL})`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
