name: Deploy Firebase Preview

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write
  
jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build the project
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase preview channel
        id: firebase-deploy
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          CHANNEL_ID=pr-${{ github.event.pull_request.number }}
          OUTPUT=$(firebase hosting:channel:deploy $CHANNEL_ID --json)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | jq -r '.result[].url')
          echo "PREVIEW_URL=$URL" >> $GITHUB_ENV

      - name: Comment on PR with Preview URL
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const previewUrl = process.env.PREVIEW_URL;
            const prNumber = context.payload.pull_request.number;
            const body = `🚀 Firebase preview deployed: [View Preview](${previewUrl})`;
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            })
