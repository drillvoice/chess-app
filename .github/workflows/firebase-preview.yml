name: Deploy Firebase Preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js (with npm cache)
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build the project
        run: npm run build

      - name: Deploy to Firebase preview channel
        id: firebase-deploy
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          set -e
          CHANNEL_ID=pr-${{ github.event.pull_request.number }}
          npx firebase-tools hosting:channel:deploy "$CHANNEL_ID" --json > firebase_output.json

          node - <<'NODE' >> $GITHUB_ENV
          const fs = require('fs');
          const txt = fs.readFileSync('firebase_output.json','utf8');
          let o; try { o = JSON.parse(txt); } catch { console.error('Bad JSON'); process.exit(1); }

          const urls = [];
          const crawl = x => {
            if (!x || typeof x !== 'object') return;
            for (const [k,v] of Object.entries(x)) {
              if (typeof v === 'string' && /^https?:\/\/.+\.(web\.app|firebaseapp\.com)/.test(v)) urls.push(v);
              else if (v && typeof v === 'object') crawl(v);
            }
          };

          if (o.result) {
            if (Array.isArray(o.result)) urls.push(...o.result.map(r => r && r.url).filter(Boolean));
            else if (o.result.url) urls.push(o.result.url);
            else crawl(o.result);
          } else {
            crawl(o);
          }

          if (!urls.length) { console.error('No preview URL found'); process.exit(1); }
          console.log('PREVIEW_URL=' + urls[0]);
          NODE

      - name: Comment on PR with Preview URL
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `🚀 Firebase preview deployed: [View Preview](${process.env.PREVIEW_URL})`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
