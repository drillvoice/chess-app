# .github/workflows/firebase-prod-manual.yml
name: Deploy Firebase Production (manual)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref/branch/tag to deploy
        default: main
        required: true
      confirm:
        description: Type DEPLOY to confirm
        required: true

permissions:
  contents: read

concurrency:
  group: firebase-prod
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.inputs.confirm == 'DEPLOY' }}
    runs-on: ubuntu-latest
    environment: production   # (optional) use env protections/approvals in Settings → Environments
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Setup Node.js (LTS) + cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Deploy to Firebase (production)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npx firebase-tools deploy --only hosting
